<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews/Suggestions</title>
    <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png">
    <link rel="icon" href="/icon-512.png" sizes="512x512" type="image/png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body{margin:5%;}
        textarea{height:20vh;}
    </style>
</head>
<body class="text-center">
    <h1>Reviews or Suggestions</h1>
    <div class="container container-fluid shadow-lg p-3 rounded" id="review" style="display:block;">
      <form action="https://formsubmit.co/169e14b2ec6831781fbbf75f9b0a10d4" method="POST" class="text-center">
        <br>
        <label for="name"><h4>Name:</h4></label>
        <input type="text" class="form-control text-center" id="name" name="name" placeholder="Your Name" required>
        <br>
        <label for="email"><h4>Email:</h4></label>
        <input type="email" class="form-control text-center" id="email" name="email" placeholder="Your Email" required>
        <br>
        <label for="textarea"><h4>Review:</h4></label>
        <textarea id="textarea" class="form-control text-center" name="message" placeholder="Review or Suggestion" required></textarea>
        <!-- Subject -->
        <input type="hidden" name="_subject" value="New submission from arjundawande.github.io!">
        <!-- Template -->
        <input type="hidden" name="_template" value="box">
        <!-- Honeypot -->
        <input type="text" name="_honey" style="display:none">
        <!-- Disable Captcha -->
        <input type="text" name="_captcha" value="false" style="display:none;">
        <!-- Redirect to Thank You Page -->
        <input type="text" name="_next" value="https://arjundawande.github.io/thankyou.html" style="display:none;">
        <br>
        <!-- Submit -->
        <input type="submit" class="form-control bg-primary text-white" value="Submit"><br><br>
        <p class="fs-6 text-muted alert alert-secondary">Please note that your review will be sent to me but it will not be displayed anywhere on this website.</p>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
